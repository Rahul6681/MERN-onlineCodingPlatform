version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: codearena_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: codearena
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: codearena_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codearena_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/codearena
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev_jwt_access_secret_codearena_2026
      JWT_REFRESH_SECRET: dev_jwt_refresh_secret_codearena_2026
      CLIENT_URL: http://localhost:5173
    depends_on:
      - mongo
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: codearena_frontend
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
