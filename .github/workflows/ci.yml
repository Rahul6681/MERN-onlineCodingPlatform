name: CodeArena CI Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Monorepo Dependencies
        run: npm run install:all

      - name: Run Backend Tests
        env:
          MONGO_URI: mongodb://localhost:27017/codearena_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ci_jwt_access_secret_12345
          JWT_REFRESH_SECRET: ci_jwt_refresh_secret_12345
        run: npm run test:backend

      - name: Build Frontend Application
        run: npm run build:frontend
